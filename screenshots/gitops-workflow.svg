<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>

    <!-- Node Gradient (Active) -->
    <linearGradient id="nodeActiveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f293d" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowOrange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Marker Arrow -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#4b5563" />
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#ff7a00" />
    </marker>
  </defs>

  <style>
    /* CSS Animation styles supported by GitHub SVG Renderer */
    @keyframes flowDash {
      to {
        stroke-dashoffset: -40;
      }
    }

    @keyframes pulseNode {
      0%, 100% {
        stroke-width: 1.5px;
        filter: drop-shadow(0px 0px 2px rgba(0, 240, 255, 0.2));
      }
      50% {
        stroke-width: 2.5px;
        filter: drop-shadow(0px 0px 8px rgba(0, 240, 255, 0.6));
      }
    }

    @keyframes pulseArgo {
      0%, 100% {
        stroke-width: 1.5px;
        filter: drop-shadow(0px 0px 2px rgba(255, 122, 0, 0.2));
      }
      50% {
        stroke-width: 2.5px;
        filter: drop-shadow(0px 0px 8px rgba(255, 122, 0, 0.6));
      }
    }

    /* Base Styles */
    .bg-card {
      fill: url(#bgGrad);
      stroke: #1e293b;
      stroke-width: 1px;
    }

    .connection-line {
      fill: none;
      stroke: #374151;
      stroke-width: 2;
      stroke-dasharray: 6 6;
      animation: flowDash 2s linear infinite;
    }

    .ci-flow {
      stroke: #00f0ff;
      animation: flowDash 1.2s linear infinite;
    }

    .cd-flow {
      stroke: #ff7a00;
      animation: flowDash 1s linear infinite;
    }

    .node-box {
      fill: #111827;
      stroke: #374151;
      stroke-width: 1.5px;
      rx: 8;
    }

    .node-active-ci {
      stroke: #00f0ff;
      animation: pulseNode 3s infinite ease-in-out;
    }

    .node-active-cd {
      stroke: #ff7a00;
      animation: pulseArgo 3s infinite ease-in-out;
    }

    .node-title {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 600;
      fill: #f3f4f6;
    }

    .node-desc {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 11px;
      fill: #9ca3af;
    }

    .badge-text {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 10px;
      font-weight: bold;
      fill: #111827;
    }

    .step-num {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 10px;
      font-weight: bold;
      fill: #9ca3af;
    }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" class="bg-card" rx="12" />

  <!-- PIPELINE PATHS (Animated Flows) -->
  
  <!-- Step 1: Dev to GitHub -->
  <path d="M 160 200 L 220 200" class="connection-line ci-flow" marker-end="url(#arrowCyan)" />
  
  <!-- Step 2: GitHub to GitHub Actions -->
  <path d="M 360 200 Q 405 130 450 130" class="connection-line ci-flow" marker-end="url(#arrowCyan)" />
  
  <!-- Step 3: GHA to DockerHub -->
  <path d="M 590 130 L 670 130" class="connection-line ci-flow" marker-end="url(#arrowCyan)" />
  
  <!-- Step 4: DockerHub to Argo CD Image Updater -->
  <path d="M 740 170 L 740 230" class="connection-line cd-flow" marker-end="url(#arrowOrange)" />
  
  <!-- Step 5: Image Updater to Argo CD Server -->
  <path d="M 670 270 L 590 270" class="connection-line cd-flow" marker-end="url(#arrowOrange)" />
  
  <!-- Step 6: Argo CD Server to Kubernetes Namespace -->
  <path d="M 450 270 Q 405 270 360 270" class="connection-line cd-flow" marker-end="url(#arrowOrange)" />

  <!-- INTERNAL K8S COUPLING -->
  <!-- App Pods to Headless MongoDB -->
  <path d="M 290 300 L 290 330" class="connection-line" marker-end="url(#arrow)" />

  <!-- NODES (COMPONENTS) -->

  <!-- NODE 1: Developer Workstation -->
  <g transform="translate(20, 160)">
    <rect width="140" height="80" class="node-box" />
    <circle cx="25" cy="25" r="12" fill="#1f2937" />
    <path d="M 21 21 L 29 29 M 29 21 L 21 29" stroke="#9ca3af" stroke-width="2" />
    <text x="50" y="28" class="node-title">Developer</text>
    <text x="15" y="52" class="node-desc">Local Workstation</text>
    <text x="15" y="67" class="node-desc">Code Push (Git)</text>
    <text x="125" y="18" class="step-num">01</text>
  </g>

  <!-- NODE 2: GitHub Repository -->
  <g transform="translate(220, 160)">
    <rect width="140" height="80" class="node-box node-active-ci" />
    <circle cx="25" cy="25" r="12" fill="#00f0ff" fill-opacity="0.1" />
    <circle cx="25" cy="25" r="6" fill="#00f0ff" />
    <text x="50" y="28" class="node-title">GitHub Repo</text>
    <text x="15" y="52" class="node-desc">Git Repository</text>
    <text x="15" y="67" class="node-desc">Trigger Webhook</text>
    <text x="125" y="18" class="step-num">02</text>
  </g>

  <!-- NODE 3: GitHub Actions (CI) -->
  <g transform="translate(450, 90)">
    <rect width="140" height="80" class="node-box node-active-ci" />
    <circle cx="25" cy="25" r="12" fill="#00f0ff" fill-opacity="0.1" />
    <path d="M 20 25 L 23 28 L 30 20" fill="none" stroke="#00f0ff" stroke-width="2" />
    <text x="50" y="28" class="node-title">GitHub Actions</text>
    <text x="15" y="52" class="node-desc">Docker Build / Test</text>
    <text x="15" y="67" class="node-desc">Tag &amp; Push Image</text>
    <text x="125" y="18" class="step-num">03</text>
  </g>

  <!-- NODE 4: Docker Hub Registry -->
  <g transform="translate(670, 90)">
    <rect width="140" height="80" class="node-box" />
    <circle cx="25" cy="25" r="12" fill="#1f2937" />
    <rect x="20" y="20" width="10" height="10" fill="#3b82f6" rx="2" />
    <text x="50" y="28" class="node-title">Docker Hub</text>
    <text x="15" y="52" class="node-desc">Image Registry</text>
    <text x="15" y="67" class="node-desc">Docker Registries</text>
    <text x="125" y="18" class="step-num">04</text>
  </g>

  <!-- NODE 5: Argo CD Image Updater -->
  <g transform="translate(670, 230)">
    <rect width="140" height="80" class="node-box node-active-cd" />
    <circle cx="25" cy="25" r="12" fill="#ff7a00" fill-opacity="0.1" />
    <path d="M 25 18 L 29 25 L 21 25 Z" fill="#ff7a00" />
    <path d="M 25 32 L 29 25 L 21 25 Z" fill="#ff7a00" />
    <text x="50" y="28" class="node-title">Image Updater</text>
    <text x="15" y="52" class="node-desc">Monitors DockerHub</text>
    <text x="15" y="67" class="node-desc">Auto Git Write-Back</text>
    <text x="125" y="18" class="step-num">05</text>
  </g>

  <!-- NODE 6: Argo CD Server -->
  <g transform="translate(450, 230)">
    <rect width="140" height="80" class="node-box node-active-cd" />
    <circle cx="25" cy="25" r="12" fill="#ff7a00" fill-opacity="0.1" />
    <circle cx="25" cy="25" r="6" fill="#ff7a00" />
    <text x="50" y="28" class="node-title">Argo CD Server</text>
    <text x="15" y="52" class="node-desc">State Reconciliation</text>
    <text x="15" y="67" class="node-desc">GitOps Controller</text>
    <text x="125" y="18" class="step-num">06</text>
  </g>

  <!-- NODE 7: Target Kubernetes Cluster (shopping-app Namespace) -->
  <g transform="translate(220, 250)">
    <!-- Outer Box representing Cluster/Namespace -->
    <rect width="140" height="130" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" rx="8" />
    <rect x="5" y="5" width="130" height="20" fill="#1e293b" rx="4" />
    <text x="12" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#38bdf8">K8S: shopping-app</text>

    <!-- Node.js App Pod -->
    <g transform="translate(10, 32)">
      <rect width="120" height="40" fill="#111827" stroke="#38bdf8" stroke-width="1" rx="4" />
      <text x="10" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#f3f4f6">Web Application</text>
      <text x="10" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#9ca3af">4 Pods | NodePort 30080</text>
    </g>

    <!-- Headless MongoDB StatefulSet -->
    <g transform="translate(10, 80)">
      <rect width="120" height="40" fill="#111827" stroke="#10b981" stroke-width="1" rx="4" />
      <text x="10" y="18" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="bold" fill="#f3f4f6">MongoDB StatefulSet</text>
      <text x="10" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#9ca3af">mongo-0 | local-path SC</text>
    </g>
    <text x="125" y="20" class="step-num">07</text>
  </g>

  <!-- FLOW LABELS (STAGE INFO) -->
  <g transform="translate(380, 50)">
    <rect width="120" height="24" fill="#0284c7" rx="12" />
    <text x="60" y="16" class="badge-text" fill="#ffffff" text-anchor="middle">CONTINUOUS INTEGRATION</text>
  </g>

  <g transform="translate(380, 345)">
    <rect width="120" height="24" fill="#ea580c" rx="12" />
    <text x="60" y="16" class="badge-text" fill="#ffffff" text-anchor="middle">CONTINUOUS DELIVERY</text>
  </g>
</svg>
