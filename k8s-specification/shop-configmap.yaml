apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-app-config
  namespace: shopping-app
data:
  MONGO_DB: "shop"
  MONGO_HOST: "mongo-0.mongo.shopping-app.svc.cluster.local:27017,mongo-1.mongo.shopping-app.svc.cluster.local:27017,mongo-2.mongo.shopping-app.svc.cluster.local:27017"
  MONGO_PORT: "27017"
  MONGO_OPTIONS: "replicaSet=rs0&authSource=admin"
