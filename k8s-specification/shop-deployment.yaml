apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-app-deployment
  namespace: shopping-app
  labels:
    app: myshop
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: myshop
  template:
    metadata:
      labels:
        app: myshop
    spec:
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -w 2 mongo 27017; do echo waiting for mongodb; sleep 2; done;"
      containers:
        - name: shopping-container
          image: harshavardhan88/nodejs-cicd-shopping:28f473fb182b6cf82863d9f44317f277c8fad01e
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_USER
              valueFrom:
                configMapKeyRef:
                  name: mongodb-config
                  key: username
            - name: MONGO_PWD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: password
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: mongodb-app-config
                  key: MONGO_HOST
            - name: MONGO_PORT
              valueFrom:
                configMapKeyRef:
                  name: mongodb-app-config
                  key: MONGO_PORT
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: mongodb-app-config
                  key: MONGO_DB
            - name: MONGODB_URI
              value: "mongodb://$(MONGO_USER):$(MONGO_PWD)@$(MONGO_HOST):$(MONGO_PORT)/$(MONGO_DB)?authSource=$(MONGO_DB)"
